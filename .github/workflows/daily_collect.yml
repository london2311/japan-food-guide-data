name: Daily sample collection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sample collector
        run: |
          python run_sample.py

      - name: Run tests
        run: |
          pytest

      - name: Upload generated data
        uses: actions/upload-artifact@v4
        with:
          name: generated-restaurant-data
          path: |
            data/hiroshima/restaurants.csv
            data/hiroshima/restaurants.json
            data/hiroshima/diff_report.json
